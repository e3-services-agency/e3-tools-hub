<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sunday Natural Survey iframe test</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #6F7B6D;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100vh;
      min-height: 950px;
      border: 0;
      background: #6F7B6D;
    }

    @media (max-width: 600px) {
      iframe {
        min-height: 1100px;
      }
    }
  </style>
</head>

<body>
  <iframe
    id="sunday-natural-survey-iframe"
    title="Sunday Natural survey iframe test"
    loading="eager">
  </iframe>

  <script>
    const surveyUrl = "https://cdn.exponea.com/sunday/s/eyJjdXN0b21lcl9pZCI6IjY4Mjc0N2IxMDRmZDUxOTJjN2FjNThmOSIsInN1cnZleV9pZCI6IjY5ZTljNjk3MjM0ZGVmZDY2MGE4YzliMiJ9.kkXDPygbE6_VlCB140XYGjT0Q2E";

    const parentUrl = encodeURIComponent(window.location.href);

    document.getElementById("sunday-natural-survey-iframe").src =
      surveyUrl + "?parent_url=" + parentUrl;
  </script>
</body>
</html>
